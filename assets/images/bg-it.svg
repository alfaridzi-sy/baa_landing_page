<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <!-- Latar Belakang Biru Pucat (Menyelaraskan warna aksen IT) -->
  <rect width="400" height="200" fill="#EBF0F8"/>
  
  <!-- Jaringan Node / Konektivitas -->
  <g stroke="#2B5BA8" stroke-width="2" fill="none" opacity="0.15">
    <path d="M 50 100 L 150 50 L 250 120 L 350 80"/>
    <path d="M 150 50 L 200 180 L 250 120"/>
    <path d="M 50 100 L 100 160 L 200 180"/>
  </g>
  
  <!-- Titik Node -->
  <circle cx="50" cy="100" r="6" fill="#0F2248" opacity="0.2"/>
  <circle cx="150" cy="50" r="8" fill="#C9A84C" opacity="0.3"/>
  <circle cx="250" cy="120" r="6" fill="#0F2248" opacity="0.2"/>
  <circle cx="350" cy="80" r="8" fill="#C9A84C" opacity="0.3"/>
  <circle cx="100" cy="160" r="5" fill="#2B5BA8" opacity="0.2"/>
  <circle cx="200" cy="180" r="6" fill="#0F2248" opacity="0.2"/>
  
  <!-- Bracket Kode / Teknologi -->
  <path d="M 300 140 L 280 160 L 300 180" fill="none" stroke="#0F2248" stroke-width="4" stroke-linecap="round" opacity="0.1"/>
  <path d="M 340 140 L 360 160 L 340 180" fill="none" stroke="#2B5BA8" stroke-width="4" stroke-linecap="round" opacity="0.15"/>
</svg>
