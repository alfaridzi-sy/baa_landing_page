<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250" width="100%" height="100%">
  <!-- Background Light -->
  <rect width="300" height="250" fill="#F8F7F3"/>
  <rect width="300" height="250" fill="#C9A84C" opacity="0.03"/>

  <!-- Abstract Server/Database Representation -->
  <g transform="translate(50, 60)" fill="#FFFFFF" stroke="#0F2248" stroke-width="2">
    <!-- Server Stack -->
    <rect x="0" y="0" width="200" height="35" rx="6" />
    <rect x="0" y="45" width="200" height="35" rx="6" />
    <rect x="0" y="90" width="200" height="35" rx="6" />
  </g>

  <!-- Server Indicators -->
  <g transform="translate(50, 60)" fill="#C9A84C">
    <!-- Row 1 -->
    <circle cx="20" cy="17.5" r="4" />
    <rect x="35" y="15" width="40" height="5" rx="2" />
    <!-- Row 2 -->
    <circle cx="20" cy="62.5" r="4" />
    <rect x="35" y="60" width="60" height="5" rx="2" />
    <!-- Row 3 -->
    <circle cx="20" cy="107.5" r="4" />
    <rect x="35" y="105" width="30" height="5" rx="2" />
  </g>

  <!-- Connecting Lines -->
  <path d="M 220 77.5 L 260 77.5 L 260 167.5 L 220 167.5" fill="none" stroke="#0F2248" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="260" cy="122.5" r="5" fill="#0F2248"/>

  <!-- Accent Geometry -->
  <circle cx="260" cy="122.5" r="30" fill="none" stroke="#C9A84C" stroke-width="1" stroke-dasharray="4 4"/>
</svg>
