<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- 
    Lencana Oktagon (Sesuai Referensi PDF)
    Digunakan untuk area visual besar atau dokumen cetak
  -->
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C96A" />
      <stop offset="50%" stop-color="#C9A84C" />
      <stop offset="100%" stop-color="#A8883A" />
    </linearGradient>
  </defs>

  <!-- Latar Belakang Oktagon -->
  <polygon points="120,20 280,20 380,120 380,280 280,380 120,380 20,280 20,120" fill="#0A152D" />
  
  <!-- Ikon Berlian Utama -->
  <g stroke="url(#gold-grad)" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <path d="M 160 80 L 240 80 L 280 140 L 200 240 L 120 140 Z" />
    <path d="M 120 140 L 280 140" />
    <path d="M 160 80 L 145 140" />
    <path d="M 240 80 L 255 140" />
    <path d="M 160 80 L 200 140" />
    <path d="M 240 80 L 200 140" />
    <path d="M 145 140 L 200 240" />
    <path d="M 255 140 L 200 240" />
    <path d="M 200 140 L 200 240" />
  </g>

  <!-- Ornamen Garis & Teks "EST 2022" -->
  <g stroke="#C9A84C" stroke-width="2" stroke-linecap="round">
    <!-- Kiri (EST) -->
    <path d="M 70 195 L 130 195" />
    <path d="M 70 215 L 130 215" />
    <!-- Kanan (2022) -->
    <path d="M 270 195 L 330 195" />
    <path d="M 270 215 L 330 215" />
  </g>

  <!-- Teks Identitas -->
  <text x="100" y="210" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="14" font-weight="600" fill="#C9A84C" text-anchor="middle" letter-spacing="2">EST</text>
  <text x="300" y="210" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="14" font-weight="600" fill="#C9A84C" text-anchor="middle" letter-spacing="2">2022</text>
  
  <text x="200" y="300" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="18" font-weight="800" fill="#E8E8F0" text-anchor="middle" letter-spacing="3">CV. BERLIAN ARTHA ABADI</text>
</svg>
