<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <!-- Latar Belakang -->
  <rect width="400" height="200" fill="#F8F7F3"/>
  
  <!-- Jaringan Heksagonal (Molekul / Agribisnis) -->
  <g stroke="#C9A84C" stroke-width="2" fill="none" opacity="0.2">
    <polygon points="100,50 130,35 160,50 160,80 130,95 100,80"/>
    <polygon points="160,80 190,65 220,80 220,110 190,125 160,110"/>
    <polygon points="100,110 130,95 160,110 160,140 130,155 100,140"/>
  </g>
  
  <!-- Gelombang Abstrak (Cairan / Alam) -->
  <path d="M 0 150 Q 100 100 200 150 T 400 150 L 400 200 L 0 200 Z" fill="#0F2248" opacity="0.05"/>
  <path d="M 0 170 Q 100 130 200 170 T 400 170 L 400 200 L 0 200 Z" fill="#162B5A" opacity="0.08"/>
  
  <!-- Node Solid -->
  <circle cx="220" cy="80" r="8" fill="#C9A84C" opacity="0.3"/>
  <circle cx="160" cy="110" r="12" fill="#0F2248" opacity="0.1"/>
  <circle cx="130" cy="155" r="6" fill="#C9A84C" opacity="0.4"/>
</svg>
