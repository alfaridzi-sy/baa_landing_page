<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <!-- Latar Belakang -->
  <rect width="400" height="200" fill="#F8F7F3"/>
  <rect width="400" height="200" fill="#C9A84C" opacity="0.02"/>
  
  <!-- Representasi Meja / Arsitektural -->
  <rect x="50" y="100" width="150" height="8" fill="#0F2248" opacity="0.1"/>
  <rect x="60" y="108" width="8" height="92" fill="#C9A84C" opacity="0.15"/>
  <rect x="180" y="108" width="8" height="92" fill="#C9A84C" opacity="0.15"/>
  
  <!-- Berkas / Organisasi -->
  <rect x="80" y="60" width="40" height="40" fill="#162B5A" opacity="0.08"/>
  <rect x="90" y="50" width="40" height="50" fill="#C9A84C" opacity="0.15"/>
  
  <!-- Kartu Dokumen Geometris -->
  <rect x="250" y="40" width="100" height="160" rx="4" fill="#0F2248" opacity="0.03"/>
  <rect x="270" y="60" width="60" height="6" fill="#C9A84C" opacity="0.2"/>
  <rect x="270" y="80" width="40" height="6" fill="#162B5A" opacity="0.1"/>
</svg>
